# fly.toml app configuration file
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# This bot is a worker (Discord gateway + cron loop). It does not serve HTTP,
# so there is no [http_service] block — that would let Fly auto-stop the VM
# when no traffic arrives. The machine should stay running 24/7.

app = 'letterboxd-discord-bot'
primary_region = 'ord'

# Bucket "today"/"yesterday" in the audience's wall-clock TZ, not UTC.
# Letterboxd's watchedDate is a tz-less YYYY-MM-DD; comparing against now in
# the bot's local TZ keeps the relative-day string aligned for that audience.
[env]
TZ = 'America/Los_Angeles'

[build]

[[vm]]
size = 'shared-cpu-1x'
memory = '768mb'
